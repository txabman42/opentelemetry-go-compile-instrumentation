# gorilla/mux route template span rename
# Hooks the internal route resolution functions to rename the local-root span
# from the raw URL path to the matched route template (e.g., "/users/{id}"),
# which is the standard HTTP server span naming convention.

rule130:
  target: "github.com/gorilla/mux"
  func: "setCurrentRoute"
  version: "v1.3.0,v1.7.4"
  before: "BeforeSetCurrentRoute"
  path: "github.com/open-telemetry/opentelemetry-go-compile-instrumentation/pkg/instrumentation/mux"

rule174:
  target: "github.com/gorilla/mux"
  func: "requestWithRoute"
  version: "v1.7.4,v1.8.2"
  before: "BeforeRequestWithRoute"
  path: "github.com/open-telemetry/opentelemetry-go-compile-instrumentation/pkg/instrumentation/mux"
