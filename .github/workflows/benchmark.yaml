name: Compile-Time Benchmarks

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions: read-all

jobs:
  # CodSpeed posts PR comments by comparing the PR head to the most recent main
  # baseline.
  codspeed:
    name: CodSpeed Benchmarks
    runs-on: ubuntu-latest  # TODO: oracle-bare-metal-64cpu-1024gb-x86-64-ubuntu-24
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
      - name: Install Go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c  # v6.1.0
        with:
          go-version-file: go.mod
          cache-dependency-path: "**/go.mod"
      - name: Build otelc
        run: make build
      - name: Run benchmarks
        uses: CodSpeedHQ/action@db35df748deb45fdef0960669f57d627c1956c30  # ratchet:CodSpeedHQ/action@v4
        with:
          mode: walltime
          run: make benchmark/codspeed BENCH_TIME=5x

  # Fails if any scenario's otelc overhead exceeds 150% of the plain baseline.
  overhead-threshold:
    name: Overhead Threshold Check
    runs-on: ubuntu-latest  # TODO: oracle-bare-metal-64cpu-1024gb-x86-64-ubuntu-24
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
      - name: Install Go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c  # v6.1.0
        with:
          go-version-file: go.mod
          cache-dependency-path: "**/go.mod"
      - name: Build otelc
        run: make build
      - name: Check overhead ceiling
        run: make benchmark/threshold
